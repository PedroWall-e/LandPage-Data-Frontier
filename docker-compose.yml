version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: data-frontier-backend
    restart: unless-stopped
    # Expor a porta 8080 só é necessário se você quiser acessar o backend por fora do portainer
    # Deixei mapeado para facilitar os testes iniciais, mas no futuro pode ser comentado
    ports:
      - "8080:8080"
    environment:
      - EMAIL_USER
      - EMAIL_PASS
      - ADMIN_TOKEN
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: data-frontier-frontend
    restart: unless-stopped
    ports:
      - "80:80" # O Frontend estará acessível no RPi via IP (porta padrão do navegador)
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
