version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: data-frontier-backend
    restart: unless-stopped
    # O backend só será acessível pela rede interna do docker (pelo frontend/Nginx)
    # ports:
    #   - "8080:8080"
    environment:
      - EMAIL_USER
      - EMAIL_PASS
      - ADMIN_TOKEN
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: data-frontier-frontend
    restart: unless-stopped
    ports:
      - "3000:80" # Frontend Web responderá na porta alternativa 3000 (R. Pi Interno: 80)
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
